<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Smart Cleaning — Заказы</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f0f0f;
    --card: #1a1a1a;
    --card2: #222222;
    --yellow: #FFDD00;
    --yellow-dim: rgba(255,221,0,0.12);
    --text: #f0f0f0;
    --text-dim: #888;
    --border: #2a2a2a;
    --green: #4caf50;
    --blue: #2196f3;
    --orange: #ff9800;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* HEADER */
  .header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 16px 16px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-dot {
    width: 8px; height: 8px;
    background: var(--yellow);
    border-radius: 50%;
  }
  .logo-text {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  .refresh-btn {
    background: var(--yellow-dim);
    border: 1px solid rgba(255,221,0,0.3);
    color: var(--yellow);
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .refresh-btn:active { opacity: 0.7; transform: scale(0.97); }

  /* MONTH NAV */
  .month-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .month-nav button {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 20px;
    cursor: pointer;
    padding: 4px 10px;
    border-radius: 8px;
    transition: all 0.15s;
  }
  .month-nav button:active { background: var(--border); }
  .month-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    text-transform: capitalize;
  }

  /* CALENDAR */
  .calendar-wrap { padding: 12px 16px 0; }
  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    margin-bottom: 4px;
  }
  .weekday {
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 600;
    padding: 4px 0;
  }
  .weekday.weekend { color: #e57373; }
  .days-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }
  .day-cell {
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    cursor: pointer;
    position: relative;
    transition: all 0.15s;
    border: 1px solid transparent;
  }
  .day-cell.empty { pointer-events: none; }
  .day-cell.today {
    border-color: var(--yellow);
  }
  .day-cell.has-orders {
    background: var(--yellow-dim);
  }
  .day-cell.selected {
    background: var(--yellow);
    color: #000;
  }
  .day-cell:not(.empty):not(.selected):active {
    background: var(--border);
  }
  .day-num {
    font-size: 14px;
    font-weight: 600;
    line-height: 1;
  }
  .day-cell.selected .day-num { color: #000; font-weight: 800; }
  .order-dot {
    width: 4px; height: 4px;
    background: var(--yellow);
    border-radius: 50%;
    margin-top: 2px;
  }
  .day-cell.selected .order-dot { background: #000; }
  .day-cell.weekend-day .day-num { color: #e57373; }
  .day-cell.selected .day-num { color: #000 !important; }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .stats-bar::-webkit-scrollbar { display: none; }
  .stat-chip {
    flex-shrink: 0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 8px 12px;
    text-align: center;
    min-width: 80px;
  }
  .stat-val {
    font-size: 18px;
    font-weight: 800;
    color: var(--yellow);
    line-height: 1;
  }
  .stat-lbl {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 2px;
    white-space: nowrap;
  }

  /* ORDERS LIST */
  .orders-section {
    padding: 0 16px;
  }
  .section-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .section-count {
    background: var(--yellow);
    color: #000;
    font-size: 11px;
    font-weight: 800;
    padding: 2px 7px;
    border-radius: 10px;
  }

  .order-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }
  .order-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--yellow);
    border-radius: 3px 0 0 3px;
  }
  .order-card:active { transform: scale(0.99); border-color: var(--yellow); }

  .order-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .order-type {
    font-size: 14px;
    font-weight: 700;
    flex: 1;
    margin-right: 8px;
  }
  .order-status {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 8px;
    flex-shrink: 0;
  }
  .status-confirmed { background: rgba(76,175,80,0.15); color: var(--green); }
  .status-new { background: rgba(33,150,243,0.15); color: var(--blue); }
  .status-done { background: rgba(136,136,136,0.15); color: var(--text-dim); }

  .order-info {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .order-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-dim);
  }
  .order-row span:first-child { font-size: 14px; flex-shrink: 0; }
  .order-row .val { color: var(--text); }

  .order-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .order-price {
    font-size: 16px;
    font-weight: 800;
    color: var(--yellow);
  }
  .order-time {
    font-size: 13px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* DETAIL MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }
  .modal {
    background: var(--card);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    padding: 20px 16px 40px;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
  }
  .modal-overlay.open .modal {
    transform: translateY(0);
  }
  .modal-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 16px;
  }
  .modal-title {
    font-size: 18px;
    font-weight: 800;
    margin-bottom: 16px;
    padding-right: 40px;
  }
  .modal-close {
    position: absolute;
    top: 20px; right: 16px;
    background: var(--card2);
    border: none;
    color: var(--text-dim);
    width: 32px; height: 32px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .modal-actions {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .action-btn {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: none;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: all 0.15s;
  }
  .action-btn:active { transform: scale(0.97); opacity: 0.85; }
  .btn-copy {
    background: var(--yellow);
    color: #000;
  }
  .btn-share {
    background: var(--card2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .copy-success {
    background: var(--green) !important;
    color: #fff !important;
  }
  .modal-section {
    margin-bottom: 16px;
  }
  .modal-section-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
  }
  .detail-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .detail-row:last-child { border-bottom: none; }
  .detail-icon { font-size: 18px; width: 24px; text-align: center; flex-shrink: 0; }
  .detail-content { flex: 1; }
  .detail-label { font-size: 11px; color: var(--text-dim); margin-bottom: 1px; }
  .detail-value { font-size: 14px; font-weight: 600; color: var(--text); }
  .detail-value.highlight { color: var(--yellow); font-size: 18px; font-weight: 800; }

  .phone-link {
    color: var(--yellow);
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
  }

  /* ACTION BUTTONS */
  .action-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 16px;
  }
  .action-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 12px;
    border-radius: 12px;
    border: none;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }
  .action-btn:active { transform: scale(0.97); opacity: 0.8; }
  .btn-copy {
    background: var(--yellow);
    color: #000;
  }
  .btn-share {
    background: var(--card2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-call {
    background: rgba(76,175,80,0.15);
    color: var(--green);
    border: 1px solid rgba(76,175,80,0.3);
    grid-column: 1 / -1;
    font-size: 15px;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #333;
    color: #fff;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    transition: all 0.3s;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* LOADING */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    gap: 12px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--yellow);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--text-dim); font-size: 14px; }

  /* EMPTY */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-text { color: var(--text-dim); font-size: 14px; }

  /* ERROR */
  .error-state {
    text-align: center;
    padding: 40px 20px;
  }
  .error-text { color: #e57373; font-size: 14px; margin-bottom: 12px; }
  .retry-btn {
    background: var(--yellow);
    color: #000;
    border: none;
    padding: 10px 24px;
    border-radius: 20px;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-dot"></div>
      <div class="logo-text">Smart Cleaning</div>
    </div>
    <button class="refresh-btn" onclick="loadData()">↻ Обновить</button>
  </div>
  <div class="month-nav">
    <button onclick="prevMonth()">‹</button>
    <div class="month-title" id="monthTitle"></div>
    <button onclick="nextMonth()">›</button>
  </div>
</div>

<div class="calendar-wrap">
  <div class="weekdays">
    <div class="weekday">Пн</div>
    <div class="weekday">Вт</div>
    <div class="weekday">Ср</div>
    <div class="weekday">Чт</div>
    <div class="weekday">Пт</div>
    <div class="weekday weekend">Сб</div>
    <div class="weekday weekend">Вс</div>
  </div>
  <div class="days-grid" id="daysGrid"></div>
</div>

<div class="stats-bar" id="statsBar"></div>

<div class="orders-section" id="ordersSection"></div>

<!-- MODAL -->
<div class="toast" id="toast"></div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="closeModalDirect()">×</button>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-actions">
      <button class="action-btn btn-copy" id="copyBtn" onclick="copyOrder()">📋 Скопировать</button>
      <button class="action-btn btn-share" onclick="shareOrder()">↗ Поделиться</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
const SHEET_ID = '1MAOTtpOJEF2fUemBqOqITxfxvHsRwY6G46JDz1YAQOM';
const SHEET_NAME = 'Заказы';
const API_KEY = 'AIzaSyD-placeholder'; // будет использован публичный доступ

let allOrders = [];
let currentDate = new Date();
let selectedDate = null;
let isLoading = false;

const MONTHS_RU = ['Январь','Февраль','Март','Апрель','Май','Июнь',
                   'Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

// Init Telegram WebApp
if (window.Telegram?.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
  document.documentElement.style.setProperty('--tg-theme-bg', 
    Telegram.WebApp.themeParams.bg_color || '#0f0f0f');
}

async function loadData() {
  if (isLoading) return;
  isLoading = true;
  showLoading();

  try {
    // Используем публичный CSV экспорт
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}`;
    const response = await fetch(url);
    if (!response.ok) throw new Error('Ошибка загрузки');
    const csv = await response.text();
    allOrders = parseCSV(csv);
    renderAll();
  } catch (e) {
    showError(e.message);
  } finally {
    isLoading = false;
  }
}

function parseCSV(csv) {
  const lines = csv.split('\n').filter(l => l.trim());
  const orders = [];
  
  // Пропускаем первые 4 строки (заголовки таблицы)
  for (let i = 4; i < lines.length; i++) {
    const cols = parseCSVLine(lines[i]);
    if (!cols[1] || cols[1].trim() === '' || cols[1].trim() === '""') continue;
    
    const dateRaw = cols[1]?.replace(/"/g, '').trim();
    if (!dateRaw) continue;
    
    const dateObj = parseDate(dateRaw);
    if (!dateObj) continue;

    orders.push({
      num: cols[0]?.replace(/"/g, '').trim(),
      date: dateObj,
      dateStr: formatDate(dateObj),
      type: cols[2]?.replace(/"/g, '').trim() || '—',
      sqm: cols[3]?.replace(/"/g, '').trim() || '',
      client: cols[4]?.replace(/"/g, '').trim() || '—',
      phone: cols[5]?.replace(/"/g, '').trim() || '',
      address: cols[6]?.replace(/"/g, '').trim() || '—',
      entrance: cols[7]?.replace(/"/g, '').trim() || '',
      time: cols[8]?.replace(/"/g, '').trim() || '',
      status: cols[9]?.replace(/"/g, '').trim() || '',
      sum: cols[10]?.replace(/"/g, '').trim() || '',
      comment: cols[11]?.replace(/"/g, '').trim() || '',
    });
  }
  return orders;
}

function parseCSVLine(line) {
  const result = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    if (line[i] === '"') {
      inQuotes = !inQuotes;
    } else if (line[i] === ',' && !inQuotes) {
      result.push(current);
      current = '';
    } else {
      current += line[i];
    }
  }
  result.push(current);
  return result;
}

function parseDate(str) {
  if (!str) return null;
  // DD.MM.YYYY
  const m1 = str.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})/);
  if (m1) return new Date(+m1[3], +m1[2]-1, +m1[1]);
  // YYYY-MM-DD
  const m2 = str.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m2) return new Date(+m2[1], +m2[2]-1, +m2[3]);
  // Google Sheets serial number
  const num = parseFloat(str);
  if (!isNaN(num) && num > 40000) {
    const d = new Date((num - 25569) * 86400 * 1000);
    return new Date(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate());
  }
  return null;
}

function formatDate(d) {
  if (!d) return '';
  return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;
}

function sameDay(a, b) {
  return a.getFullYear() === b.getFullYear() &&
         a.getMonth() === b.getMonth() &&
         a.getDate() === b.getDate();
}

function getOrdersForDate(date) {
  return allOrders.filter(o => o.date && sameDay(o.date, date));
}

function getOrdersForMonth(year, month) {
  return allOrders.filter(o => o.date && 
    o.date.getFullYear() === year && o.date.getMonth() === month);
}

function renderAll() {
  renderCalendar();
  renderStats();
  if (selectedDate) {
    renderOrders(selectedDate);
  } else {
    renderOrders(new Date());
  }
}

function renderCalendar() {
  const y = currentDate.getFullYear();
  const m = currentDate.getMonth();
  
  document.getElementById('monthTitle').textContent = `${MONTHS_RU[m]} ${y}`;
  
  const monthOrders = getOrdersForMonth(y, m);
  const orderDays = new Set(monthOrders.map(o => o.date.getDate()));
  
  const firstDay = new Date(y, m, 1);
  const lastDay = new Date(y, m+1, 0);
  let startDow = firstDay.getDay(); // 0=Sun
  if (startDow === 0) startDow = 7;
  startDow -= 1; // Mon=0
  
  const today = new Date();
  const grid = document.getElementById('daysGrid');
  grid.innerHTML = '';
  
  // Empty cells
  for (let i = 0; i < startDow; i++) {
    const cell = document.createElement('div');
    cell.className = 'day-cell empty';
    grid.appendChild(cell);
  }
  
  // Day cells
  for (let d = 1; d <= lastDay.getDate(); d++) {
    const cell = document.createElement('div');
    const thisDate = new Date(y, m, d);
    const dow = thisDate.getDay();
    const isWeekend = dow === 0 || dow === 6;
    const isToday = sameDay(thisDate, today);
    const hasOrders = orderDays.has(d);
    const isSelected = selectedDate && sameDay(thisDate, selectedDate);
    
    let cls = 'day-cell';
    if (isWeekend) cls += ' weekend-day';
    if (isToday) cls += ' today';
    if (hasOrders) cls += ' has-orders';
    if (isSelected) cls += ' selected';
    
    cell.className = cls;
    cell.innerHTML = `<span class="day-num">${d}</span>${hasOrders ? '<div class="order-dot"></div>' : ''}`;
    cell.onclick = () => selectDate(new Date(y, m, d));
    grid.appendChild(cell);
  }
}

function selectDate(date) {
  selectedDate = date;
  renderCalendar();
  renderStats();
  renderOrders(date);
  // Scroll to orders
  setTimeout(() => {
    document.getElementById('ordersSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

function renderStats() {
  const y = currentDate.getFullYear();
  const m = currentDate.getMonth();
  const monthOrders = getOrdersForMonth(y, m);
  
  const total = monthOrders.length;
  const confirmed = monthOrders.filter(o => o.status === 'Подтверждён').length;
  const done = monthOrders.filter(o => o.status === 'Выполнен').length;
  const revenue = monthOrders
    .filter(o => o.sum)
    .reduce((s, o) => s + (parseFloat(o.sum.replace(/[^\d.]/g,'')) || 0), 0);
  
  const bar = document.getElementById('statsBar');
  bar.innerHTML = `
    <div class="stat-chip">
      <div class="stat-val">${total}</div>
      <div class="stat-lbl">Заказов</div>
    </div>
    <div class="stat-chip">
      <div class="stat-val">${confirmed}</div>
      <div class="stat-lbl">Подтверждено</div>
    </div>
    <div class="stat-chip">
      <div class="stat-val">${done}</div>
      <div class="stat-lbl">Выполнено</div>
    </div>
    <div class="stat-chip">
      <div class="stat-val">${revenue > 0 ? Math.round(revenue/1000)+'к' : '0'}</div>
      <div class="stat-lbl">₸ выручка</div>
    </div>
  `;
}

function renderOrders(date) {
  const orders = getOrdersForDate(date);
  const section = document.getElementById('ordersSection');
  
  const dateStr = date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', weekday: 'short' });
  
  if (orders.length === 0) {
    section.innerHTML = `
      <div class="section-title">${dateStr}</div>
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <div class="empty-text">Заказов на этот день нет</div>
      </div>`;
    return;
  }
  
  section.innerHTML = `
    <div class="section-title">
      ${dateStr}
      <span class="section-count">${orders.length}</span>
    </div>
    ${orders.map((o, i) => orderCard(o, i)).join('')}
  `;
}

function statusClass(s) {
  if (s === 'Подтверждён') return 'status-confirmed';
  if (s === 'Новый') return 'status-new';
  return 'status-done';
}

function orderCard(o, i) {
  return `
    <div class="order-card" onclick="openModal(${i}, '${o.dateStr}')">
      <div class="order-header">
        <div class="order-type">${o.type}</div>
        <div class="order-status ${statusClass(o.status)}">${o.status || '—'}</div>
      </div>
      <div class="order-info">
        <div class="order-row"><span>👤</span><span class="val">${o.client}</span></div>
        <div class="order-row"><span>📍</span><span class="val">${o.address}</span></div>
        ${o.sqm ? `<div class="order-row"><span>📐</span><span class="val">${o.sqm} м²</span></div>` : ''}
      </div>
      <div class="order-footer">
        <div class="order-price">${o.sum ? o.sum + ' ₸' : '—'}</div>
        <div class="order-time">🕐 ${o.time || '—'}</div>
      </div>
    </div>`;
}

function openModal(idx, dateStr) {
  const orders = allOrders.filter(o => o.dateStr === dateStr);
  const o = orders[idx] || allOrders.find(o => o.dateStr === dateStr);
  if (!o) return;
  
  // find in currently shown orders
  const shown = selectedDate ? getOrdersForDate(selectedDate) : getOrdersForDate(new Date());
  const order = shown[idx] || o;
  
  document.getElementById('modalTitle').textContent = order.type;
  document.getElementById('modalBody').innerHTML = `
    <div class="modal-section">
      <div class="modal-section-title">Клиент</div>
      <div class="detail-row">
        <div class="detail-icon">👤</div>
        <div class="detail-content">
          <div class="detail-label">Имя</div>
          <div class="detail-value">${order.client}</div>
        </div>
      </div>
      <div class="detail-row">
        <div class="detail-icon">📞</div>
        <div class="detail-content">
          <div class="detail-label">Телефон</div>
          <div class="detail-value">
            <a class="phone-link" href="tel:${order.phone}">${order.phone || '—'}</a>
          </div>
        </div>
      </div>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">Объект</div>
      <div class="detail-row">
        <div class="detail-icon">📍</div>
        <div class="detail-content">
          <div class="detail-label">Адрес</div>
          <div class="detail-value">${order.address}</div>
        </div>
      </div>
      ${order.entrance ? `<div class="detail-row">
        <div class="detail-icon">🚪</div>
        <div class="detail-content">
          <div class="detail-label">Подъезд / КВ</div>
          <div class="detail-value">${order.entrance}</div>
        </div>
      </div>` : ''}
      ${order.sqm ? `<div class="detail-row">
        <div class="detail-icon">📐</div>
        <div class="detail-content">
          <div class="detail-label">Площадь</div>
          <div class="detail-value">${order.sqm} м²</div>
        </div>
      </div>` : ''}
    </div>

    <div class="modal-section">
      <div class="modal-section-title">Заказ</div>
      <div class="detail-row">
        <div class="detail-icon">📅</div>
        <div class="detail-content">
          <div class="detail-label">Дата и время</div>
          <div class="detail-value">${order.dateStr} в ${order.time || '—'}</div>
        </div>
      </div>
      <div class="detail-row">
        <div class="detail-icon">✅</div>
        <div class="detail-content">
          <div class="detail-label">Статус</div>
          <div class="detail-value">${order.status || '—'}</div>
        </div>
      </div>
      <div class="detail-row">
        <div class="detail-icon">💰</div>
        <div class="detail-content">
          <div class="detail-label">Сумма</div>
          <div class="detail-value highlight">${order.sum ? order.sum + ' ₸' : '—'}</div>
        </div>
      </div>
      ${order.comment ? `<div class="detail-row">
        <div class="detail-icon">💬</div>
        <div class="detail-content">
          <div class="detail-label">Комментарий</div>
          <div class="detail-value">${order.comment}</div>
        </div>
      </div>` : ''}
    </div>

    <div class="action-buttons">
      ${order.phone ? `<a class="action-btn btn-call" href="tel:${order.phone}">📞 Позвонить ${order.phone}</a>` : ''}
      <button class="action-btn btn-copy" onclick="copyPhone('${order.phone}')">📋 Скопировать телефон</button>
      <button class="action-btn btn-share" onclick="shareOrder()">↗ Поделиться</button>
    </div>
  `;
  
  currentOrderData = order;
  document.getElementById('modalOverlay').classList.add('open');
  if (window.Telegram?.WebApp) Telegram.WebApp.HapticFeedback.impactOccurred('light');
}

let currentOrderData = null;

function buildOrderText(o) {
  return [
    '🟢 ПОДТВЕРЖДЁННЫЙ ЗАКАЗ',
    '',
    '🧹 Тип: ' + o.type,
    o.sqm ? '📐 Площадь: ' + o.sqm + ' м²' : '',
    o.comment ? '💬 Комментарий: ' + o.comment : '',
    '',
    '👤 Клиент: ' + o.client,
    '📞 Телефон: ' + o.phone,
    '📍 Адрес: ' + o.address,
    o.entrance ? '🚪 Подъезд/КВ: ' + o.entrance : '',
    '',
    '📅 Дата: ' + o.dateStr,
    '🕐 Время: ' + o.time,
    o.sum ? '💰 Сумма: ' + o.sum + ' ₸' : '',
  ].filter(Boolean).join('
');
}

function copyOrder() {
  if (!currentOrderData) return;
  const text = buildOrderText(currentOrderData);
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✅ Скопировано!';
    btn.classList.add('copy-success');
    setTimeout(() => {
      btn.textContent = '📋 Скопировать';
      btn.classList.remove('copy-success');
    }, 2000);
    if (window.Telegram?.WebApp) Telegram.WebApp.HapticFeedback.notificationOccurred('success');
  }).catch(() => {
    // fallback
    const el = document.createElement('textarea');
    el.value = text;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✅ Скопировано!';
    btn.classList.add('copy-success');
    setTimeout(() => { btn.textContent = '📋 Скопировать'; btn.classList.remove('copy-success'); }, 2000);
  });
}

function shareOrder() {
  if (!currentOrderData) return;
  const text = buildOrderText(currentOrderData);
  if (navigator.share) {
    navigator.share({ text });
  } else if (window.Telegram?.WebApp) {
    Telegram.WebApp.switchInlineQuery(text);
  }
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function copyPhone(phone) {
  if (!phone) return;
  navigator.clipboard.writeText(phone).then(() => {
    showToast('✅ Телефон скопирован');
    if (window.Telegram?.WebApp) Telegram.WebApp.HapticFeedback.notificationOccurred('success');
  }).catch(() => {
    // fallback
    const el = document.createElement('textarea');
    el.value = phone;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    showToast('✅ Телефон скопирован');
  });
}

function shareOrder() {
  const title = document.getElementById('modalTitle').textContent;
  const bodyEl = document.getElementById('modalBody');
  const values = bodyEl.querySelectorAll('.detail-value');
  let text = `🟢 ${title}\n`;
  bodyEl.querySelectorAll('.detail-row').forEach(row => {
    const label = row.querySelector('.detail-label')?.textContent;
    const val = row.querySelector('.detail-value')?.textContent?.trim();
    if (label && val && val !== '—') text += `${label}: ${val}\n`;
  });

  if (window.Telegram?.WebApp && Telegram.WebApp.isVersionAtLeast('6.1')) {
    Telegram.WebApp.switchInlineQuery(text);
  } else if (navigator.share) {
    navigator.share({ text }).catch(() => {});
  } else {
    navigator.clipboard.writeText(text).then(() => showToast('✅ Заказ скопирован'));
  }
}

function prevMonth() {
  currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1);
  selectedDate = null;
  renderCalendar();
  renderStats();
  renderOrders(new Date(currentDate.getFullYear(), currentDate.getMonth(), 1));
}

function nextMonth() {
  currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1);
  selectedDate = null;
  renderCalendar();
  renderStats();
  renderOrders(new Date(currentDate.getFullYear(), currentDate.getMonth(), 1));
}

function showLoading() {
  document.getElementById('ordersSection').innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <div class="loading-text">Загружаем заказы...</div>
    </div>`;
}

function showError(msg) {
  document.getElementById('ordersSection').innerHTML = `
    <div class="error-state">
      <div class="error-text">Ошибка: ${msg}</div>
      <button class="retry-btn" onclick="loadData()">Попробовать снова</button>
    </div>`;
}

// Start
loadData();
</script>
</body>
</html>
